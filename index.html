<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tótem - Pizzas 1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script>self.FIREBASE_APPCHECK_DEBUG_TOKEN="9D75EF79-110D-451F-9C5E-A1525245B583";</script>
<style>
  :root{--rojo:#E63946;--azul:#1D3557;--amarillo:#FFB703;--bg:#FFF8F0}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:'Inter',sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:16px}
  .contenedor{max-width:440px;width:100%;background:white;border-radius:28px;padding:24px;box-shadow:0 20px 50px #1D35571A;text-align:center;position:relative;overflow:hidden}
  .contenedor::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--rojo),var(--amarillo),var(--azul))}
  .brand{font-family:'Fredoka';color:var(--azul);font-size:18px;letter-spacing:1px;margin-bottom:4px} .brand span{color:var(--rojo)}
  h1{font-family:'Fredoka';font-size:26px;color:var(--azul);margin:6px 0 12px;line-height:1.1}
  .numero-grande{font-family:'Fredoka';font-size:72px;color:var(--azul);line-height:1;margin:10px 0}
  .estado-box{font-weight:700;color:var(--azul);background:#F1F5F9;padding:14px;border-radius:14px;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:14px;gap:4px}
</style>
</head>
<body>
<div class="contenedor" id="contenedor-principal">
  <div class="brand">PIZZAS <span>1</span> • RETIRO</div>
  <h1 id="titulo">Generando tu turno...</h1>
  <div id="numero-view" style="display:none">
    <div style="color:#888;font-size:12px;letter-spacing:1px">TU TURNO ES</div>
    <div id="num-txt" class="numero-grande">#0</div>
  </div>
  <div id="estado-pantalla" class="estado-box">Conectando con el sistema...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, onValue, off, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check.js";

const firebaseConfig = { apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo", authDomain: "avisador-arayapp.firebaseapp.com", databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com", projectId: "avisador-arayapp", storageBucket: "avisador-arayapp.firebasestorage.app", messagingSenderId: "337997002279", appId: "1:337997002279:web:6dc307a6e474432e64c002" };
const app = initializeApp(firebaseConfig);
const appCheck = initializeAppCheck(app, { provider: new ReCaptchaV3Provider('6LcPPFEtAAAAAIVtKgVFo1jtAQWRESDHHnCjMKaE'), isTokenAutoRefreshEnabled: true });
const db = getDatabase(app); const auth = getAuth(app);
const RUTA_BASE = 'pizzas_1';
const KEY_BLOQUEO = 'pizzas_1_ticket_auto'; 
const KEY_FECHA = 'pizzas_1_fecha_auto'; 
let pedidoRefActual = null, audioCtx = null, intervaloAlarma = null;

function sonarFuerte(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = 880; gain.gain.setValueAtTime(0.8,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.8);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.8);
    if("vibrate" in navigator) navigator.vibrate([800,200,800]);
  }catch(e){}
}

function escucharPedido(ticketId){
  if(pedidoRefActual) off(pedidoRefActual);
  pedidoRefActual = ref(db, `${RUTA_BASE}/pedidos/${ticketId}`);
  
  document.getElementById("numero-view").style.display = "block";
  document.getElementById("num-txt").innerText = "#" + ticketId;

  onValue(pedidoRefActual, (snap)=>{
    const data = snap.val(); 
    const titulo = document.getElementById("titulo"); 
    const estadoEl = document.getElementById("estado-pantalla");
    
    if(!data){ 
      titulo.innerText = "Turno finalizado"; 
      estadoEl.innerHTML = `Pedido #${ticketId} entregado<br><small>Vuelve a escanear el QR si necesitas otro pedido</small>`; 
      return; 
    }
    if(data.estado==="ESPERA"){ 
      titulo.innerText = "Pedido en preparación"; 
      estadoEl.innerHTML = `⏳ Pedido #${ticketId} en cocina<br><small>Te avisaremos cuando esté listo</small>`; 
    }
    if(data.estado==="LISTO"){ 
      titulo.innerHTML = "¡PEDIDO LISTO!"; 
      estadoEl.innerHTML = `<h2 style='font-family:Fredoka;color:#E63946;margin:0'>¡#${ticketId} LISTO!</h2>Retira en mostrador`; 
      sonarFuerte(); 
      let c = 0; 
      if(intervaloAlarma) clearInterval(intervaloAlarma); 
      intervaloAlarma = setInterval(()=>{ 
        if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); 
        sonarFuerte(); 
        c++; 
        document.body.style.background = (c%2===0)?"#ff0000":"#FFF8F0"; 
        if(c>30){clearInterval(intervaloAlarma); document.body.style.background="";} 
      },1500); 
    }
  });
}

async function obtenerYAsignarTurnoAutomatico(){
  const contadorRef = ref(db, `${RUTA_BASE}/contador`);
  try {
    let nuevoNumero = 0;
    await runTransaction(contadorRef, (currentData) => {
      let actual = (currentData === null || isNaN(currentData)) ? 0 : Number(currentData);
      nuevoNumero = actual + 1;
      return nuevoNumero;
    });

    const hoy = new Date().toDateString();
    localStorage.setItem(KEY_BLOQUEO, nuevoNumero);
    localStorage.setItem(KEY_FECHA, hoy);

    await set(ref(db, `${RUTA_BASE}/pedidos/${nuevoNumero}`), {
      estado: "ESPERA",
      timestamp: Date.now()
    });

    escucharPedido(nuevoNumero);
  } catch(err) {
    console.error(err);
    document.getElementById("titulo").innerText = "Error al generar turno";
    document.getElementById("estado-pantalla").innerHTML = `<div style='color:red; font-size:13px;'>${err.message}</div>`;
  }
}

signInAnonymously(auth).then(async ()=>{
  const ticketGuardado = localStorage.getItem(KEY_BLOQUEO);
  const fechaGuardada = localStorage.getItem(KEY_FECHA);
  const hoy = new Date().toDateString();

  if(ticketGuardado && fechaGuardada !== hoy){
    localStorage.removeItem(KEY_BLOQUEO);
    localStorage.removeItem(KEY_FECHA);
  }

  const turnoExistente = localStorage.getItem(KEY_BLOQUEO);

  if(turnoExistente){
    const snap = await get(ref(db, `${RUTA_BASE}/pedidos/${turnoExistente}`));
    if(snap.exists()){
      escucharPedido(turnoExistente);
    } else {
      localStorage.removeItem(KEY_BLOQUEO);
      await obtenerYAsignarTurnoAutomatico();
    }
  } else {
    await obtenerYAsignarTurnoAutomatico();
  }
});
</script>
</body>
</html>
