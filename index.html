<script>self.FIREBASE_APPCHECK_DEBUG_TOKEN="9D75EF79-110D-451F-9C5E-A1525245B583";</script>
<style>
  :root{--rojo:#E63946;--azul:#1D3557;--amarillo:#FFB703;--bg:#FFF8F0}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:'Inter',sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:16px}
  .contenedor{max-width:440px;width:100%;background:white;border-radius:28px;padding:24px;box-shadow:0 20px 50px #1D35571A;text-align:center;position:relative;overflow:hidden}
  .contenedor::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--rojo),var(--amarillo),var(--azul))}
  .brand{font-family:'Fredoka';color:var(--azul);font-size:18px;letter-spacing:1px;margin-bottom:4px} .brand span{color:var(--rojo)}
  h1{font-family:'Fredoka';font-size:26px;color:var(--azul);margin:6px 0 12px;line-height:1.1}
  .numero-grande{font-family:'Fredoka';font-size:72px;color:var(--azul);line-height:1;margin:10px 0}
  .estado-box{font-weight:700;color:var(--azul);background:#F1F5F9;padding:14px;border-radius:14px;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:14px;gap:4px}
  .input-manual{width:100%;padding:14px;border:2px solid #cbd5e1;border-radius:12px;font-size:24px;font-family:'Fredoka';text-align:center;color:var(--azul);margin:12px 0}
  .btn{width:100%;padding:16px;border:none;border-radius:14px;font-weight:800;font-size:16px;cursor:pointer;margin-top:12px}
  .btn-azul{background:var(--azul);color:white}
</style>
</head>
<body>
<div class="contenedor" id="contenedor-principal">
  <div class="brand">PIZZAS <span>1</span> • RETIRO</div>
  <h1 id="titulo">Ingresa tu Turno</h1>
  
  <div id="vista-ingreso">
    <p style="color:#666;font-size:14px;margin-bottom:10px">Escribe el número de pedido que te dieron en caja:</p>
    <input type="number" id="input-turno" class="input-manual" placeholder="Ej: 5" pattern="[0-9]*">
    <button class="btn btn-azul" onclick="vincularTurnoManual()">Ver Estado de mi Pedido</button>
  </div>

  <div id="numero-view" style="display:none">
    <div style="color:#888;font-size:12px;letter-spacing:1px">TU TURNO ES</div>
    <div id="num-txt" class="numero-grande">#0</div>
  </div>
  
  <div id="estado-pantalla" class="estado-box" style="display:none">Cargando...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, onValue, off, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check.js";

const firebaseConfig = { apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo", authDomain: "avisador-arayapp.firebaseapp.com", databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com", projectId: "avisador-arayapp", storageBucket: "avisador-arayapp.firebasestorage.app", messagingSenderId: "337997002279", appId: "1:337997002279:web:6dc307a6e474432e64c002" };
const app = initializeApp(firebaseConfig);
const appCheck = initializeAppCheck(app, { provider: new ReCaptchaV3Provider('6LcPPFEtAAAAAIVtKgVFo1jtAQWRESDHHnCjMKaE'), isTokenAutoRefreshEnabled: true });
const db=getDatabase(app); const auth=getAuth(app);
const RUTA_BASE='pizzas_1';
const KEY_BLOQUEO='pizzas_1_ticket_manual';
let pedidoRefActual=null, audioCtx=null, intervaloAlarma=null;

function sonarFuerte(){
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain();
    osc.type='sine'; osc.frequency.value=880; gain.gain.setValueAtTime(0.8,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.8);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.8);
    if("vibrate" in navigator) navigator.vibrate([800,200,800]);
  }catch(e){}
}

window.vincularTurnoManual = async function() {
  const val = document.getElementById("input-turno").value.trim();
  if(!val || isNaN(val)) {
    alert("Por favor ingresa un número de turno válido.");
    return;
  }
  
  const ticketId = Number(val);
  const ticketRef = ref(db, `${RUTA_BASE}/pedidos/${ticketId}`);
  const snap = await get(ticketRef);
  
  if(!snap.exists()) {
    alert("El turno #" + ticketId + " no existe o ya fue finalizado en cocina.");
    return;
  }
  
  localStorage.setItem(KEY_BLOQUEO, ticketId);
  iniciarEscucha(ticketId);
}

function iniciarEscucha(ticketId){
  document.getElementById("vista-ingreso").style.display = "none";
  document.getElementById("numero-view").style.display = "block";
  document.getElementById("estado-pantalla").style.display = "flex";
  document.getElementById("num-txt").innerText = "#" + ticketId;
  document.getElementById("titulo").innerText = "Estado de tu Pedido";

  if(pedidoRefActual) off(pedidoRefActual);
  pedidoRefActual = ref(db, `${RUTA_BASE}/pedidos/${ticketId}`);
  
  onValue(pedidoRefActual, (snap)=>{
    const data = snap.val(); 
    const estadoEl = document.getElementById("estado-pantalla");
    const titulo = document.getElementById("titulo");
    
    if(!data){ 
      titulo.innerText = "Turno finalizado"; 
      estadoEl.innerHTML = `Pedido #${ticketId} entregado<br><small>Vuelve a ingresar un turno si es necesario</small>`; 
      return; 
    }
    if(data.estado==="ESPERA"){ 
      titulo.innerText = "Pedido en preparación"; 
      estadoEl.innerHTML = `⏳ Pedido #${ticketId} en cocina<br><small>Te avisaremos con sonido</small>`; 
    }
    if(data.estado==="LISTO"){ 
      titulo.innerHTML = "¡PEDIDO LISTO!"; 
      estadoEl.innerHTML = `<h2 style='font-family:Fredoka;color:#E63946;margin:0'>¡#${ticketId} LISTO!</h2>Retira en mostrador`; 
      sonarFuerte(); 
      let c=0; 
      if(intervaloAlarma) clearInterval(intervaloAlarma); 
      intervaloAlarma=setInterval(()=>{ 
        if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); 
        sonarFuerte(); 
        c++; 
        document.body.style.background=(c%2===0)?"#ff0000":"#FFF8F0"; 
        if(c>30){clearInterval(intervaloAlarma); document.body.style.background="";} 
      },1500); 
    }
  });
}

signInAnonymously(auth).then(()=>{
  const ticketGuardado = localStorage.getItem(KEY_BLOQUEO);
  if(ticketGuardado){
    iniciarEscucha(ticketGuardado);
  }
});
</script>

tps:")return false;var host=url.hostname.toLowerCase();var supported=host==="instagram.com"||host.endsWith(".instagram.com")||host==="facebook.com"||host.endsWith(".facebook.com");return supported&&/\/reels?\//i.test(url.pathname)}catch(_){return false}}function isInlineMediaUrlClick(node,href){var slot=findInlineMediaSlot(node);if(!slot)return false;var slotUrl=readInlineMediaUrl(slot);if(slotUrl)return urlsMatch(href,slotUrl);return isFirstPartyReelUrl(href)}function findDataHref(start){for(var node=start;node&&node!==document.body;node=node.parentElement){if(node.getAttribute){var href=node.getAttribute("data-href")||node.getAttribute("data-url");if(href)return{href:href,node:node}}}return null}var nativeOpen=window.open;window.open=function(url){if(parent!==window&&typeof url==="string"&&/^https?:\/\//.test(url)){parent.postMessage({type:"ecto:usercontent-link-click",href:url},"*");return null}return nativeOpen?nativeOpen.apply(window,arguments):null};document.addEventListener("click",function(e){var target=e.target instanceof Element?e.target:null;if(!target)return;if(parent===window)return;var a=target.closest?target.closest("a[href]"):null;if(a&&a.href&&/^https?:\/\//.test(a.href)&&a.href.replace(/#.*$/,"")!==loc){if(isInlineMediaUrlClick(a,a.href))return;var productId=extractProductId(target)||extractProductId(a);if(productId){e.preventDefault();parent.postMessage({type:"ecto-artifact-link-click",productId:productId},"*");return}e.preventDefault();parent.postMessage({type:"ecto:usercontent-link-click",href:a.href},"*");return}var dataHref=findDataHref(target);if(dataHref&&/^https?:\/\//.test(dataHref.href)&&dataHref.href.replace(/#.*$/,"")!==loc){if(isInlineMediaUrlClick(dataHref.node,dataHref.href))return;e.preventDefault();parent.postMessage({type:"ecto:usercontent-link-click",href:dataHref.href},"*")}},true)})();</script><script>(function(){var FOCUS_TYPE="ecto:artifact-focus-request";var CLOSE_TYPE="ecto:artifact-close-request";function focusArtifactDocu
